services:
  - type: web
    name: automacao-admissao-backend-homolog
    runtime: python
    rootDir: backend
    plan: starter
    branch: homolog
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api_admissao:app --bind 0.0.0.0:$PORT --workers 2 --timeout 180
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_ENV
        value: homolog
      - key: ENVIRONMENT
        value: homolog
      - key: SUPABASE_URL
        sync: false           # URL do Supabase de HOMOLOG (projeto separado)
      - key: SUPABASE_KEY
        sync: false
      - key: DB_HOST
        sync: false           # Banco de homolog (pode ser o mesmo com DB_NAME diferente)
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: newdb_homolog   # Schema separado para não misturar com prod
      - key: APLIS_BASE_URL
        value: https://lab.aplis.inf.br/api/integracao.php
      - key: APLIS_USUARIO
        sync: false
      - key: APLIS_SENHA
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CPF_API_TOKEN
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: sa-east-1
      - key: S3_BUCKET_NAME
        value: aplis2-homolog   # Bucket separado para não sobrescrever arquivos de prod
      - key: GOOGLE_PROJECT_ID
        sync: false
      - key: GOOGLE_LOCATION
        value: us-central1
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false

  - type: web
    name: automacao-admissao-frontend-homolog
    runtime: static
    rootDir: .
    plan: free
    branch: homolog
    autoDeploy: true
    buildCommand: npm install && npm run build
    staticPublishPath: build
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: https://automacao-admissao-backend-homolog.onrender.com
      - key: REACT_APP_SUPABASE_URL
        sync: false           # Supabase de HOMOLOG
      - key: REACT_APP_SUPABASE_ANON_KEY
        sync: false
      - key: REACT_APP_SUPABASE_SERVICE_KEY
        sync: false
      - key: REACT_APP_ENVIRONMENT
        value: homolog
